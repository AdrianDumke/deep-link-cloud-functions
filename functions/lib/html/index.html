<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />

    <link rel="icon" type="image/png" href="" />
    <link rel="mask-icon" href="" color="#ffffff" />

    <title>{{title}}</title>
    <meta name="description" content="{{description}}" />

    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:image" content="{{thumbnail}}" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{description}}" />
    <meta name="twitter:image" content="{{thumbnail}}" />

    <link rel="apple-touch-icon" href="" />

    <style>

      html,
      body {
        padding: 0;
        margin: 0;
        background-color: rgb(18, 18, 18);
        background-size: cover;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Ubuntu, sans-serif;
        justify-content: center;
        align-items: center;
        height: 100%;
      }

      /* ===== CARD ===== */

      .card {
        background: rgb(37, 37, 37);
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        text-decoration: none;
        color: inherit;
      }
      
      .cover {
        height: 260px;
        background: rgb(37, 37, 37);
      }

      #thumbnail {
        width: 100%;
        height: 100%;
        object-fit: contain; /* ← zeigt immer das ganze Bild */
        display: block;
      }
      .content {
        padding: 18px 20px 22px;
        background: rgb(37, 37, 37);
      }

      .title {
        font-size: 1.05rem;
        font-weight: 600;
        color: rgb(233, 233, 233);
        margin-bottom: 6px;
        display: -webkit-box;        /* Flexibles Box-Modell für Textbegrenzung */
        -webkit-line-clamp: 1;       /* Anzahl der Zeilen */
        -webkit-box-orient: vertical;/* vertikale Ausrichtung */
        overflow: hidden;            /* Alles, was drüber geht, ausblenden */
        text-overflow: ellipsis;     /* … am Ende */
      }

      .description {
        font-size: 0.9rem;
        line-height: 1.45;
        color: rgb(208, 208, 208);
        display: -webkit-box;        /* Flexibles Box-Modell für Textbegrenzung */
        -webkit-line-clamp: 2;       /* Anzahl der Zeilen */
        -webkit-box-orient: vertical;/* vertikale Ausrichtung */
        overflow: hidden;            /* Alles, was drüber geht, ausblenden */
        text-overflow: ellipsis;     /* … am Ende */
      }

      a {
        text-decoration: none;
        color: inherit;
      }
    </style>
  </head>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/Detect.js/2.2.2/detect.min.js"
    integrity="sha512-iNuMM5cmiXDvk4VCTp6UEbDwYy/dA3CFTTYKB6/V+LD62S58TQZ+sykXzhmVT1QvqHD39ZhecsPGXjZUaIuSWQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>

  <body>
      <div class="card">
        <div class="cover">
          <img id="thumbnail" src="{{thumbnail}}" alt="{{title}}" />
        </div>

        <div class="content">
          <div class="title">{{title}}</div>
          <div class="description">
            {{description}}
          </div>
        </div>
      </div>
  </body>

  <script>
    if ('{{redirectToStore}}' == 'true') {
      var result = detect.parse(navigator.userAgent);
      if (result.os.family === 'iOS') {
        window.location.href = 'https://apps.apple.com/us/app/{{appStoreID}}';
      } else if (result.os.family.includes('Android')) {
        if ('{{androidScheme}}' != 'false') {
          const fallbackUrl = encodeURIComponent(
            'https://play.google.com/store/apps/details?id={{androidBundleID}}',
          );
          window.location.href = `intent:#Intent;scheme={{androidScheme}};package={{androidBundleID}};S.browser_fallback_url=${fallbackUrl};end`;
        } else {
          window.location.href =
            'https://play.google.com/store/apps/details?id={{androidBundleID}}';
        }
      } else {
        if ('{{redirectUrl}}' != '') {
          window.location.href = '{{redirectUrl}}';
        }
      }
    } else if ('{{redirectUrl}}' != '') {
      window.location.href = '{{redirectUrl}}';
    }
  </script>
</html>
